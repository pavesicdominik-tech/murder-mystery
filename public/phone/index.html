        function selectRoom(room) {
            if (!joinedLobby) return;

            const config = roomsConfig[room];

            // Quick client-side check so the player gets instant
            // feedback instead of waiting on a round trip — the server
            // enforces this too (see the movePlayer handler in
            // server.js), so this is just for responsiveness, not
            // security.
            if (config && config.requiresItem) {
                const hasItem = inventory.some(item => item.id === config.requiresItem);

                if (!hasItem) {
                    showGameMessage(config.missingItemMessage || "Room is too dark to enter.");
                    roomSelect.value = currentRoom;
                    return;
                }
            }

            roomSelect.value = room;

            socket.emit("movePlayer", {
                code: joinedLobby.code,
                playerToken,
                room
            });

            showRoomImage(room);
        }

        // ------------------------------------------------------------
        // Keeping hotspots aligned with the photo, on every screen.
        //
        // Every hotspot (door or item) is positioned as a % of
        // #roomCanvas's box (e.g. left: 64%, top: 58%). That only
        // lands on the correct point of the actual photo if
        // #roomCanvas's box has the EXACT same width/height ratio as
        // the photo itself. If the box is a different shape,
        // object-fit: cover has to crop the photo to fill it — and
        // that crop shifts depending on screen size, so a hotspot
        // that lined up on one phone drifts on another.
        //
        // sizeRoomCanvas() fixes this by giving #roomCanvas a real
        // pixel width/height every time the room or screen size
        // changes, using that room's imageAspectRatio (from
        // game/rooms.js) — sized to always cover the visible scene,
        // the same way object-fit: cover would, but as an actual box
        // instead of a crop. Because the box's ratio always equals
        // the image's ratio, no cropping ever actually happens, so
        // hotspot percentages always land on the same visual point of
        // the photo regardless of device.
        // ------------------------------------------------------------
        function sizeRoomCanvas() {
            const config = roomsConfig[currentRoom];
            const ratio = (config && config.imageAspectRatio) || 16 / 9;

            const sceneWidth = roomScene.clientWidth;
            const sceneHeight = roomScene.clientHeight;

            if (!sceneWidth || !sceneHeight) return;

            let width = sceneHeight * ratio;
            let height = sceneHeight;

            if (width < sceneWidth) {
                width = sceneWidth;
                height = sceneWidth / ratio;
            }

            roomCanvas.style.width = Math.ceil(width) + "px";
            roomCanvas.style.height = Math.ceil(height) + "px";
        }

        function centerRoomScroll() {
            roomScene.scrollLeft = Math.max(
                0,
                (roomScene.scrollWidth - roomScene.clientWidth) / 2
            );

            roomScene.scrollTop = Math.max(
                0,
                (roomScene.scrollHeight - roomScene.clientHeight) / 2
            );
        }

        let resizeRafPending = false;

        function handleViewportChange() {
            if (resizeRafPending) return;
            resizeRafPending = true;

            requestAnimationFrame(() => {
                resizeRafPending = false;
                sizeRoomCanvas();
                centerRoomScroll();
            });
        }

        window.addEventListener("resize", handleViewportChange);
        window.addEventListener("orientationchange", handleViewportChange);

        // ------------------------------------------------------------
        // Flashlight effect for rooms marked `dark: true` in
        // game/rooms.js (Basement, Attic). #flashlightOverlay is a
        // black box with a radial-gradient "hole" that follows the
        // player's finger/cursor — see the CSS comment above
        // #flashlightOverlay for how the reveal itself works. This
        // just needs to keep --flashlight-x/--flashlight-y updated.
        //
        // Listening on #roomScene (not the overlay, which is
        // pointer-events: none) means this keeps working no matter
        // how the room is scrolled/panned.
        // ------------------------------------------------------------
        function setFlashlightPosition(clientX, clientY) {
            const rect = roomCanvas.getBoundingClientRect();
            if (!rect.width || !rect.height) return;

            const x = ((clientX - rect.left) / rect.width) * 100;
            const y = ((clientY - rect.top) / rect.height) * 100;

            flashlightOverlay.style.setProperty("--flashlight-x", `${x}%`);
            flashlightOverlay.style.setProperty("--flashlight-y", `${y}%`);
        }

        roomScene.addEventListener("pointermove", (event) => {
            setFlashlightPosition(event.clientX, event.clientY);
        });

        roomScene.addEventListener("pointerdown", (event) => {
            setFlashlightPosition(event.clientX, event.clientY);
        });

        // ------------------------------------------------------------
        // Click-and-drag panning for mouse/trackpad users.
        //
        // On a phone, panning a room wider than the screen already
        // works for free — touch gestures natively scroll any
        // `overflow: auto` element. A mouse has no equivalent gesture,
        // so without this, a desktop/narrow-browser player has no way
        // to see the sides of a room at all.
        //
        // Only pointerType === "mouse" is handled here — touch keeps
        // using the browser's native scrolling untouched.
        // ------------------------------------------------------------
        const DRAG_PAN_THRESHOLD_PX = 4;

        let isPanning = false;
        let panMoved = false;
        let panStartX = 0;
        let panStartY = 0;
        let panScrollStartLeft = 0;
        let panScrollStartTop = 0;

        roomScene.addEventListener("pointerdown", (event) => {
            if (event.pointerType !== "mouse" || event.button !== 0) return;

            isPanning = true;
            panMoved = false;
            panStartX = event.clientX;
            panStartY = event.clientY;
            panScrollStartLeft = roomScene.scrollLeft;
            panScrollStartTop = roomScene.scrollTop;
            roomScene.classList.add("dragging");
        });

        window.addEventListener("pointermove", (event) => {
            if (!isPanning || event.pointerType !== "mouse") return;

            const deltaX = event.clientX - panStartX;
            const deltaY = event.clientY - panStartY;

            if (!panMoved && (Math.abs(deltaX) > DRAG_PAN_THRESHOLD_PX || Math.abs(deltaY) > DRAG_PAN_THRESHOLD_PX)) {
                panMoved = true;
            }

            if (panMoved) {
                roomScene.scrollLeft = panScrollStartLeft - deltaX;
                roomScene.scrollTop = panScrollStartTop - deltaY;
            }
        });

        window.addEventListener("pointerup", (event) => {
            if (event.pointerType !== "mouse") return;

            if (panMoved) {
                // A real drag happened — swallow the click that would
                // otherwise fire on whatever hotspot/door/item ends up
                // under the cursor, so panning across one doesn't
                // accidentally trigger it.
                document.addEventListener(
                    "click",
                    (clickEvent) => {
                        clickEvent.stopPropagation();
                        clickEvent.preventDefault();
                    },
                    { capture: true, once: true }
                );
            }

            isPanning = false;
            panMoved = false;
            roomScene.classList.remove("dragging");
        });

        function showRoomImage(room) {
            currentRoom = room;

            const config = roomsConfig[room];

            roomImage.style.display = "block";
            imageMessage.style.display = "none";

            // Some rooms swap to a different image once a specific
            // lobby flag is set (e.g. the library once its piano
            // puzzle is solved) — see altImage/altImageFlag in
            // game/rooms.js.
            let imageSrc = config ? config.image : "";

            if (
                config &&
                config.altImage &&
                config.altImageFlag &&
                joinedLobby &&
                joinedLobby[config.altImageFlag]
            ) {
                imageSrc = config.altImage;
            }

            roomImage.src = imageSrc;
            roomImage.alt = (config && config.label) || "Room";

            if (config && config.dark) {
                flashlightOverlay.style.display = "block";
                flashlightOverlay.style.setProperty("--flashlight-x", "50%");
                flashlightOverlay.style.setProperty("--flashlight-y", "50%");
            } else {
                flashlightOverlay.style.display = "none";
            }

            sizeRoomCanvas();
            centerRoomScroll();

            renderDoorHotspots(room);
            renderItemHotspots(room);
            renderCharacterHotspots(room);
            renderCatHotspot(room);
            updateBasementVisibility();
            updateBasementPuzzle();
            updateAccuseHotspotVisibility();
            updatePianoHotspotVisibility();
            playCrowSoundIfFirstVisit(room);
        }

        roomImage.addEventListener("error", () => {
            imageMessage.innerHTML =
                `No image found for <strong>${roomImage.alt}</strong>.<br><br>` +
                `Add the file:<br>${roomImage.src.replace(window.location.origin, "")}`;

            imageMessage.style.display = "flex";
        });

        function updatePhoneLobby(lobby) {
            const me = lobby.players.find(player => player.token === playerToken);

            if (!me) return;

            const room = me.currentRoom || "lobby";
            const config = roomsConfig[room];

            document.getElementById("currentRoom").innerText =
                "You are in: " + (config ? config.label : room);

            roomSelect.value = room;
            updateLockedRoomOptions();
            showRoomImage(room);
            updateAccuseHotspotVisibility();
            renderVotingOverlay();
        }

        function showWaitingScreen() {
            document.getElementById("joinScreen").style.display = "none";
            document.getElementById("waitingScreen").style.display = "block";
            document.getElementById("introScreen").style.display = "none";
            document.getElementById("gameScreen").style.display = "none";

            document.getElementById("waitingText").innerText =
                "Lobby " + joinedLobby.code + " joined. Waiting for the host to start the game.";
        }

        function syncScreenToLobbyStatus(lobby) {
            if (!lobby) return;

            if (lobby.status === "ended") {
                showEndingScreen(lobby);
                return;
            }

            if (lobby.status === "playing") {
                showGameScreen();
                return;
            }

            if (lobby.status === "intro") {
                showIntroScreen();
                return;
            }

            showWaitingScreen();
        }

        // Tracks whether the typewriter has already been started for
        // the CURRENT ending, so repeated lobbyUpdate broadcasts (which
        // can keep arriving for unrelated reasons) don't restart it
        // mid-sentence. Reset in resetToJoinScreen()/leaveLobby() so a
        // later game gets a fresh typewriter.
        let endingTypewriterStarted = false;
        let currentEndingResult = null;

        function showEndingScreen(lobby) {
            document.getElementById("joinScreen").style.display = "none";
            document.getElementById("waitingScreen").style.display = "none";
            document.getElementById("introScreen").style.display = "none";
            document.getElementById("gameScreen").style.display = "none";

            document.getElementById("votingOverlay").style.display = "none";

            currentEndingResult = lobby.endingResult;

            const endingScreen = document.getElementById("endingScreen");

            endingScreen.style.backgroundImage = lobby.endingBackgroundImage
                ? `linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.8)), url("${lobby.endingBackgroundImage}")`
                : "none";

            endingScreen.style.display = "flex";

            if (!endingTypewriterStarted) {
                endingTypewriterStarted = true;
                startEndingTypewriter(lobby.endingStoryText || "");
            }
        }

        const ENDING_TYPING_SPEED = 32;
        let endingStoryFullText = "";
        let endingLetterIndex = 0;

        function startEndingTypewriter(text) {
            endingStoryFullText = text;
            endingLetterIndex = 0;

            document.getElementById("endingStoryText").textContent = "";

            const verdict = document.getElementById("endingVerdict");
            verdict.style.display = "none";
            verdict.textContent = "";

            document.getElementById("endingEndGameButton").style.display = "none";

            typeNextEndingLetter();
        }

        function typeNextEndingLetter() {
            if (endingLetterIndex >= endingStoryFullText.length) {
                finishEndingTypewriter();
                return;
            }

            document.getElementById("endingStoryText").textContent +=
                endingStoryFullText[endingLetterIndex];

            endingLetterIndex++;

            setTimeout(typeNextEndingLetter, ENDING_TYPING_SPEED);
        }

        function finishEndingTypewriter() {
            const verdict = document.getElementById("endingVerdict");

            verdict.textContent = currentEndingResult === "good" ? "GOOD ENDING" : "BAD ENDING";
            verdict.style.color = currentEndingResult === "good" ? "#3ddc73" : "#ff4d4d";
            verdict.style.display = "block";

            document.getElementById("endingEndGameButton").style.display = "block";
        }

        // Ends the session for EVERYONE — every phone falls back to the
        // join screen, and the TV returns to its very first
        // lobby-creation page. Any player can trigger this (not just
        // the host) since the mystery is already resolved by the time
        // this button is visible.
        function endGameForEveryone() {
            if (!joinedLobby) return;

            socket.emit("endGameSession", {
                code: joinedLobby.code,
                playerToken
            });
        }

        function showIntroScreen() {
            document.getElementById("joinScreen").style.display = "none";
            document.getElementById("waitingScreen").style.display = "none";
            document.getElementById("introScreen").style.display = "flex";
            document.getElementById("gameScreen").style.display = "none";

            startPhoneIntro();
            playIntroMusic();
        }

        function playIntroMusic() {
            if (!introMusicElement) return;

            introMusicElement.currentTime = 0;

            introMusicElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        function stopIntroMusic() {
            if (!introMusicElement) return;

            introMusicElement.pause();
            introMusicElement.currentTime = 0;
        }

        function showGameScreen() {
            document.getElementById("joinScreen").style.display = "none";
            document.getElementById("waitingScreen").style.display = "none";
            document.getElementById("introScreen").style.display = "none";
            document.getElementById("gameScreen").style.display = "block";

            stopIntroMusic();

            if (joinedLobby) {
                updatePhoneLobby(joinedLobby);
            }
        }

        function startPhoneIntro() {
            if (introStarted) return;

            introStarted = true;
            typeNextPhoneLetter();
        }

        function typeNextPhoneLetter() {
            if (letterIndex >= story.length) {
                phoneEnterButton.style.display = "block";
                return;
            }

            const letter = story[letterIndex];
            phoneStoryText.textContent += letter;
            letterIndex++;

            const delay = letter === "\n" ? 450 : typingSpeed;
            setTimeout(typeNextPhoneLetter, delay);
        }

        function enterMansion() {
            if (!joinedLobby) return;

            socket.emit("enterMansion", {
                code: joinedLobby.code
            });
        }

        // Generic pickup — works for any item placement defined in
        // game/rooms.js + game/items.js. `spot` is the hotspot's
        // position config, used to start the pickup animation from the
        // right place on screen.
        function pickupItem(placementId, spot) {
            if (!joinedLobby) return;

            pendingPickupSpot = spot || null;

            socket.emit("pickupItem", {
                code: joinedLobby.code,
                playerToken,
                itemId: placementId
            });
        }

        function useBasementDoor() {
            if (!joinedLobby) return;

            socket.emit("useBasementDoor", {
                code: joinedLobby.code,
                playerToken
            });
        }

        function moveBasementPicture() {
            if (!joinedLobby) return;

            socket.emit("moveBasementPicture", {
                code: joinedLobby.code,
                playerToken
            });
        }

        function openSafe() {
            if (!joinedLobby) return;

            socket.emit("openSafe", {
                code: joinedLobby.code,
                playerToken
            });
        }

        // Renders every regular door for the current room from
        // roomsConfig[room].doors. Add/remove/rearrange doors by
        // editing game/rooms.js — nothing to change here.
        function renderDoorHotspots(room) {
            doorHotspotsContainer.innerHTML = "";

            const config = roomsConfig[room];
            if (!config || !config.doors) return;

            config.doors.forEach(door => {
                // A door can optionally require a lobby flag before it's
                // shown at all (e.g. the library's hidden passage, only
                // visible once the piano puzzle is solved). This is
                // separate from a room's own requiresFlag/requiresItem,
                // which gate ENTRY regardless of which door was used.
                if (door.requiresFlag && !joinedLobby?.[door.requiresFlag]) {
                    return;
                }

                const button = document.createElement("button");
                button.type = "button";
                button.className = "hotspot doorHotspot";
                button.style.display = "block";
                button.style.left = door.left;
                button.style.top = door.top;

                if (door.width) button.style.width = door.width;
                if (door.height) button.style.height = door.height;

                button.textContent = door.label;
                button.onclick = () => selectRoom(door.target);

                doorHotspotsContainer.appendChild(button);
            });
        }

        // Renders a "take item" hotspot for every itemHotspot defined
        // on the current room, but only if that placement hasn't been
        // taken yet (by anyone) and this player doesn't already have
        // that item. Add new pickup spots by editing game/rooms.js and
        // game/items.js — nothing to change here.
        //
        // A spot with `iconHotspot: true` renders as the item's actual
        // icon image (from itemsConfig) instead of a plain dashed text
        // button — e.g. the skull sitting visibly in the attic.
        function renderItemHotspots(room) {
            itemHotspotsContainer.innerHTML = "";

            const config = roomsConfig[room];
            if (!config || !config.itemHotspots) return;

            config.itemHotspots.forEach(spot => {
                const placement = joinedLobby?.items?.[spot.placementId];
                if (!placement) return;

                const alreadyHave = inventory.some(
                    item => item.id === placement.itemId
                );

                if (placement.takenBy || alreadyHave) return;

                let element;

                if (spot.iconHotspot) {
                    const itemDetails = itemsConfig[placement.itemId];

                    element = document.createElement("img");
                    element.className = "hotspot itemIconHotspot";
                    element.src = itemDetails ? itemDetails.icon : "";
                    element.alt = spot.label || (itemDetails && itemDetails.name) || "Item";
                } else {
                    element = document.createElement("button");
                    element.type = "button";
                    element.className = "hotspot";
                    element.textContent = spot.label;
                }

                element.style.left = spot.left;
                element.style.top = spot.top;

                if (spot.width) element.style.width = spot.width;
                if (spot.height) element.style.height = spot.height;

                element.onclick = () => pickupItem(spot.placementId, spot);

                itemHotspotsContainer.appendChild(element);
            });
        }

        // Renders a clickable, gently-animated image for every character
        // standing in the current room (from characterHotspots in
        // game/rooms.js). Tapping one opens the dialogue popup. Add new
        // characters by editing game/characters.js + game/rooms.js —
        // nothing to change here.
        function renderCharacterHotspots(room) {
            characterHotspotsContainer.innerHTML = "";

            const config = roomsConfig[room];
            if (!config || !config.characterHotspots) return;

            config.characterHotspots.forEach(spot => {
                const character = charactersConfig[spot.characterId];
                if (!character) return;

                const img = document.createElement("img");
                img.className = "characterHotspot";

                // Some characters (currently only the Mysterious
                // Person) have an alternate appearance that kicks in
                // lobby-wide once a specific flag is set — here, once
                // anyone has given him the skull. Generic check: any
                // character with roomSpriteAfterSkull set uses it once
                // joinedLobby.skullGivenBy is truthy.
                const showAfterSkull =
                    Boolean(character.roomSpriteAfterSkull) &&
                    Boolean(joinedLobby?.skullGivenBy);

                img.src = showAfterSkull ? character.roomSpriteAfterSkull : character.roomSprite;
                img.alt = character.name;
                img.style.left = spot.left;
                img.style.top = spot.top;

                if (spot.width) img.style.width = spot.width;
                if (spot.height) img.style.height = spot.height;

                // The Mysterious Person doesn't use the generic
                // intro-line + questions dialogue — his interaction is
                // fully bespoke, driven by the Skull item. Every other
                // character uses the normal popup.
                if (spot.characterId === "mysterious-person") {
                    img.onclick = () => interactWithMysteriousPerson();
                } else {
                    img.onclick = () => openCharacterPopup(spot.characterId);
                }

                characterHotspotsContainer.appendChild(img);
            });
        }

        // Son's Bedroom's cat — stays visible/clickable forever, but
        // only makes noise the first catHotspot.maxClicks times (per
        // player — server-tracked, see clickCatHotspot in server.js).
        // No visual change once exhausted; it just goes quiet.
        function renderCatHotspot(room) {
            catHotspotContainer.innerHTML = "";

            const config = roomsConfig[room];
            const catConfig = config && config.catHotspot;
            if (!catConfig) return;

            const img = document.createElement("img");
            img.className = "hotspot characterHotspot";
            img.src = catConfig.image;
            img.alt = "Cat";
            img.style.left = catConfig.left;
            img.style.top = catConfig.top;

            if (catConfig.width) img.style.width = catConfig.width;
            if (catConfig.height) img.style.height = catConfig.height;

            img.onclick = () => clickCatHotspot();

            catHotspotContainer.appendChild(img);
        }

        function clickCatHotspot() {
            if (!joinedLobby) return;

            socket.emit("clickCatHotspot", {
                code: joinedLobby.code,
                playerToken
            });
        }

        socket.on("catHotspotSound", (data) => {
            if (!data.sound || !catSoundElement) return;

            if (catSoundElement.getAttribute("src") !== data.sound) {
                catSoundElement.setAttribute("src", data.sound);
            }

            catSoundElement.currentTime = 0;

            catSoundElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        });

        // Opens the dialogue popup on a character's intro line, and
        // builds one button per question. Re-opening a character
        // always starts back at their intro line.
        function openCharacterPopup(characterId) {
            const character = charactersConfig[characterId];
            if (!character) return;

            closeItemPopup();
            closeItemActionSheet();

            openCharacterId = characterId;

            document.getElementById("characterPopupImage").src = character.closeupImage;
            document.getElementById("characterPopupImage").alt = character.name;
            document.getElementById("characterPopupName").textContent = character.name;
            document.getElementById("characterDialogueText").textContent = character.introLine;

            renderQuestionButtons(character.questions);

            document.getElementById("characterPopupOverlay").style.display = "flex";

            // Marks this character as a known suspect lobby-wide (shared
            // with every player and the TV), the first time anyone opens
            // their dialogue. Safe to send every time — the server just
            // ignores repeats.
            if (joinedLobby) {
                socket.emit("interactWithCharacter", {
                    code: joinedLobby.code,
                    playerToken,
                    characterId
                });
            }
        }

        // The Mysterious Person's entire interaction is server-driven —
        // the server decides whether to reveal his hint (based on
        // lobby.skullGivenBy / whether this player currently has the
        // skull) and sends back exactly which line to show, via
        // mysteriousPersonDialogue below. No local state to check here.
        function interactWithMysteriousPerson() {
            if (!joinedLobby) return;

            socket.emit("interactWithMysteriousPerson", {
                code: joinedLobby.code,
                playerToken
            });
        }

        socket.on("mysteriousPersonDialogue", (data) => {
            const character = charactersConfig["mysterious-person"];
            if (!character) return;

            closeItemPopup();
            closeItemActionSheet();

            openCharacterId = "mysterious-person";

            // Same generic "after skull" swap as his room sprite (see
            // renderCharacterHotspots) — everyone sees his new
            // appearance in the popup too, once anyone's given it.
            const showAfterSkull =
                Boolean(character.closeupImageAfterSkull) &&
                Boolean(joinedLobby?.skullGivenBy);

            document.getElementById("characterPopupImage").src =
                showAfterSkull ? character.closeupImageAfterSkull : character.closeupImage;
            document.getElementById("characterPopupImage").alt = character.name;
            document.getElementById("characterPopupName").textContent = character.name;
            document.getElementById("characterDialogueText").textContent = data.line;

            // Only the giver's dialogue ever includes real questions
            // (data.questions) — everyone else gets null/omitted here,
            // same as any other player who hasn't unlocked a character.
            renderQuestionButtons(data.questions);

            document.getElementById("characterPopupOverlay").style.display = "flex";

            if (data.gaveSkull) {
                animateSkullGiven(data.skullIcon);
            }
        });

        // Reuses the same "flying icon" visual language as item pickup,
        // but flying from the inventory bar up toward the character
        // instead — a simple, direction-agnostic "gone from your
        // inventory" cue that works regardless of exactly where the
        // character sprite sits on screen.
        function animateSkullGiven(iconPath) {
            if (!iconPath) return;

            const flyIcon = document.createElement("img");
            flyIcon.className = "skull-fly";
            flyIcon.src = iconPath;

            document.body.appendChild(flyIcon);

            setTimeout(() => {
                flyIcon.remove();
            }, 950);
        }

        // Plays once per browser session (not persisted — a page
        // refresh will play it again), the first time THIS player
        // personally shows the Backyard room.
        let hasPlayedCrowSound = false;

        function playCrowSoundIfFirstVisit(room) {
            if (room !== "backyard" || hasPlayedCrowSound || !crowSoundElement) return;

            hasPlayedCrowSound = true;

            crowSoundElement.currentTime = 0;

            crowSoundElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        // Takes a plain questions array (not a whole character object)
        // so it works both for the generic charactersConfig[id].questions
        // (Butler/Cook/Maid/Wife/Son) AND for Mysterious Person's
        // revealedQuestions, which only ever arrives dynamically via
        // the mysteriousPersonDialogue event (never pre-loaded, since
        // it's spoiler content — see game/characters.js).
        function renderQuestionButtons(questions) {
            const list = document.getElementById("characterQuestionList");
            list.innerHTML = "";

            (questions || []).forEach(questionEntry => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "characterQuestionButton";
                button.textContent = questionEntry.question;

                button.onclick = () => {
                    document.getElementById("characterDialogueText").textContent =
                        questionEntry.answer;
                };

                list.appendChild(button);
            });
        }

        function closeCharacterPopup() {
            openCharacterId = null;
            document.getElementById("characterPopupOverlay").style.display = "none";
        }

        function updateBasementVisibility() {
            if (!joinedLobby) return;

            const unlocked = joinedLobby.basementUnlocked === true;

            const me = joinedLobby.players.find(
                player => player.token === playerToken
            );

            const room = me?.currentRoom;

            if (room === "basement-stairway") {
                basementDoorHotspot.style.display = "block";

                basementDoorHotspot.textContent = unlocked
                    ? "Enter Basement"
                    : "Locked Basement Door";
            } else {
                basementDoorHotspot.style.display = "none";
            }
        }

        // ------------------------------------------------------------
        // Piano puzzle (Library room).
        //
        // 8 keys spanning one octave: C D E F G A B C. Notes are
        // synthesized live with the Web Audio API — no sound files
        // needed for the keys themselves. Correctness is checked
        // key-by-key against roomsConfig.library.piano.sequence for
        // instant feedback; once a full match is assembled, it's sent
        // to the server for the authoritative check (submitPianoSequence
        // in server.js), which flips the shared libraryPianoSolved flag.
        // ------------------------------------------------------------
        const PIANO_KEYS = [
            { id: "c1", label: "C", frequency: 261.63 },
            { id: "d1", label: "D", frequency: 293.66 },
            { id: "e1", label: "E", frequency: 329.63 },
            { id: "f1", label: "F", frequency: 349.23 },
            { id: "g1", label: "G", frequency: 392.00 },
            { id: "a1", label: "A", frequency: 440.00 },
            { id: "b1", label: "B", frequency: 493.88 },
            { id: "c2", label: "C", frequency: 523.25 }
        ];

        let pianoAudioContext = null;
        let pianoAttempt = [];

        function getPianoAudioContext() {
            if (!pianoAudioContext) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                pianoAudioContext = new AudioContextClass();
            }

            return pianoAudioContext;
        }

        function playPianoTone(frequency) {
            try {
                const ctx = getPianoAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();

                oscillator.type = "sine";
                oscillator.frequency.value = frequency;

                gainNode.gain.setValueAtTime(0.0001, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.9);

                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);

                oscillator.start();
                oscillator.stop(ctx.currentTime + 0.9);
            } catch (err) {
                // Web Audio unavailable/blocked — keys just stay silent,
                // the puzzle itself still works fine.
            }
        }

        function playPassageOpenSound() {
            if (!passageOpenSoundElement) return;

            passageOpenSoundElement.currentTime = 0;

            passageOpenSoundElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        // Only clickable while standing in the Library and the puzzle
        // isn't already solved.
        function updatePianoHotspotVisibility() {
            if (!joinedLobby || !pianoHotspot) return;

            const canPlay =
                currentRoom === "library" &&
                !joinedLobby.libraryPianoSolved;

            pianoHotspot.style.display = canPlay ? "block" : "none";
        }

        function openPianoGame() {
            if (!joinedLobby) return;

            pianoAttempt = [];
            renderPianoKeys();

            document.getElementById("pianoOverlay").style.display = "flex";
        }

        function closePianoGame() {
            pianoAttempt = [];
            document.getElementById("pianoOverlay").style.display = "none";
        }

        function renderPianoKeys() {
            const container = document.getElementById("pianoKeys");
            container.innerHTML = "";

            PIANO_KEYS.forEach(key => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "pianoKey";
                button.textContent = key.label;
                button.onclick = () => pressPianoKey(key);

                container.appendChild(button);
            });
        }

        function pressPianoKey(key) {
            playPianoTone(key.frequency);

            const target = roomsConfig.library?.piano?.sequence || [];
            const nextIndex = pianoAttempt.length;

            if (target[nextIndex] === key.id) {
                pianoAttempt.push(key.id);
            } else if (target[0] === key.id) {
                // Wrong note — but this one could be a fresh, valid start.
                pianoAttempt = [key.id];
            } else {
                pianoAttempt = [];
            }

            if (target.length && pianoAttempt.length === target.length) {
                submitPianoSequence();
            }
        }

        function submitPianoSequence() {
            if (!joinedLobby) return;

            socket.emit("submitPianoSequence", {
                code: joinedLobby.code,
                playerToken,
                sequence: pianoAttempt
            });

            pianoAttempt = [];
        }

        socket.on("pianoSequenceCorrect", () => {
            closePianoGame();
            playPassageOpenSound();
        });

        socket.on("pianoSequenceWrong", () => {
            pianoAttempt = [];
        });

        // ------------------------------------------------------------
        // End-game accusation + voting.
        // ------------------------------------------------------------

        const accuseHotspot = document.getElementById("accuseHotspot");

        // Only clickable while standing in the Lobby room, no vote is
        // already underway, and the game hasn't already ended.
        function updateAccuseHotspotVisibility() {
            if (!joinedLobby || !accuseHotspot) return;

            const me = joinedLobby.players.find(
                player => player.token === playerToken
            );

            const canAccuse =
                me?.currentRoom === "lobby" &&
                !joinedLobby.accusation &&
                joinedLobby.status !== "ended";

            accuseHotspot.style.display = canAccuse ? "block" : "none";
        }

        // Every suspect button (accusation menu AND voting overlay) is
        // built from the same source: known/interacted characters only.
        function getKnownSuspects() {
            if (!joinedLobby) return [];

            const interacted = joinedLobby.interactedCharacters || {};

            return Object.keys(interacted)
                .filter(characterId => interacted[characterId] && charactersConfig[characterId])
                .map(characterId => charactersConfig[characterId]);
        }

        function openAccusationMenu() {
            if (!joinedLobby) return;

            const list = document.getElementById("accusationMenuList");
            const suspects = getKnownSuspects();

            if (!suspects.length) {
                list.innerHTML = '<div class="noSuspectsText">No suspects</div>';
            } else {
                list.innerHTML = "";

                suspects.forEach(character => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = "suspectButton";
                    button.textContent = character.name;
                    button.onclick = () => chooseAccusation(character.id);

                    list.appendChild(button);
                });
            }

            document.getElementById("accusationMenuOverlay").style.display = "flex";
        }

        function closeAccusationMenu() {
            document.getElementById("accusationMenuOverlay").style.display = "none";
        }

        function chooseAccusation(characterId) {
            if (!joinedLobby) return;

            socket.emit("startAccusation", {
                code: joinedLobby.code,
                playerToken,
                characterId
            });

            closeAccusationMenu();
        }

        function castVote(characterId) {
            if (!joinedLobby) return;

            socket.emit("castVote", {
                code: joinedLobby.code,
                playerToken,
                characterId
            });
        }

        // Same outcome as a tied vote — clears the accusation with no
        // ending, on every player's screen and the TV.
        function cancelVoting() {
            if (!joinedLobby) return;

            socket.emit("cancelAccusation", {
                code: joinedLobby.code,
                playerToken
            });
        }

        // Shown to every player for as long as joinedLobby.accusation
        // is set. Rebuilt on every lobbyUpdate so vote highlights and
        // (eventually) live results stay in sync automatically.
        function renderVotingOverlay() {
            const overlay = document.getElementById("votingOverlay");
            if (!joinedLobby) return;

            const accusation = joinedLobby.accusation;

            if (!accusation) {
                overlay.style.display = "none";
                return;
            }

            document.getElementById("votingAccuserLine").textContent =
                `${accusation.accuserName} is making an accusation`;

            const myVote = accusation.votes ? accusation.votes[playerToken] : null;
            const list = document.getElementById("votingList");
            list.innerHTML = "";

            getKnownSuspects().forEach(character => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "suspectButton";

                if (myVote === character.id) {
                    button.classList.add("votedFor");
                }

                button.textContent = character.name;
                button.onclick = () => castVote(character.id);

                list.appendChild(button);
            });

            overlay.style.display = "flex";
        }

        function updateBasementPuzzle() {
            if (!joinedLobby) return;

            const me = joinedLobby.players.find(
                player => player.token === playerToken
            );

            const room = me?.currentRoom;
            const pictureMoved = joinedLobby.basementPictureMoved === true;

            if (room !== "basement") {
                basementPictureHotspot.style.display = "none";
                safeHotspot.style.display = "none";
                return;
            }

            basementPictureHotspot.style.display = "block";

            if (pictureMoved) {
                basementPictureHotspot.classList.add("pictureMoved");
                safeHotspot.style.display = "block";
            } else {
                basementPictureHotspot.classList.remove("pictureMoved");
                safeHotspot.style.display = "none";
            }
        }

        function showPickupMessage(itemName) {
            const message = document.getElementById("pickupMessage");

            message.textContent = `You've picked up ${itemName}`;
            message.style.display = "block";

            setTimeout(() => {
                message.style.display = "none";
            }, 1800);
        }

        function animatePickup(iconPath) {
            const flyIcon = document.createElement("img");
            flyIcon.className = "pickup-fly";
            flyIcon.src = iconPath;

            flyIcon.style.left = (pendingPickupSpot && pendingPickupSpot.left) || "50%";
            flyIcon.style.top = (pendingPickupSpot && pendingPickupSpot.top) || "50%";

            roomCanvas.appendChild(flyIcon);

            setTimeout(() => {
                flyIcon.remove();
            }, 900);
        }

        function renderInventory() {
            const slots = document.getElementById("inventorySlots");
            const maxSlots = 8;

            let html = "";

            for (let index = 0; index < maxSlots; index++) {
                const item = inventory[index];

                if (item) {
                    html += `
                        <div
                            class="inventorySlot filled"
                            title="${escapeHtml(item.name)}"
                            onclick="openItemActionSheet('${item.id}')"
                        >
                            <img src="${item.icon}" alt="${escapeHtml(item.name)}">
                        </div>
                    `;
                } else {
                    html += `<div class="inventorySlot"></div>`;
                }
            }

            slots.innerHTML = html;
        }

        // Tracks which character's dialogue popup is currently open.
        let openCharacterId = null;

        // Tracks which item the action sheet ("Inspect" / "Give item
        // to:") is currently showing, so Inspect and the give-to
        // buttons know which item they're acting on.
        let actionSheetItemId = null;

        // Tapping a filled inventory slot opens this first, rather
        // than jumping straight to the inspect view — from here the
        // player picks Inspect (see openItemPopup) or hands it to
        // another player in the lobby (see giveItemTo).
        function openItemActionSheet(itemId) {
            const item = inventory.find(invItem => invItem.id === itemId);
            if (!item) return;

            closeCharacterPopup();
            closeItemPopup();

            actionSheetItemId = itemId;

            document.getElementById("itemActionSheetName").textContent = item.name;
            renderGiveItemPlayerList();

            document.getElementById("itemActionSheetOverlay").style.display = "flex";
        }

        function renderGiveItemPlayerList() {
            const list = document.getElementById("itemActionSheetPlayerList");
            list.innerHTML = "";

            const otherPlayers = (joinedLobby?.players || []).filter(
                player => player.token !== playerToken
            );

            if (!otherPlayers.length) {
                list.innerHTML =
                    '<div class="itemActionSheetEmpty">No other players to give this to.</div>';
                return;
            }

            otherPlayers.forEach(otherPlayer => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "itemActionButton";
                button.textContent = otherPlayer.name;
                button.onclick = () => giveItemTo(otherPlayer.token);

                list.appendChild(button);
            });
        }

        function inspectFromActionSheet() {
            if (!actionSheetItemId) return;

            const itemId = actionSheetItemId;
            closeItemActionSheet();
            openItemPopup(itemId);
        }

        function giveItemTo(toPlayerToken) {
            if (!joinedLobby || !actionSheetItemId) return;

            socket.emit("giveItem", {
                code: joinedLobby.code,
                playerToken,
                itemId: actionSheetItemId,
                toPlayerToken
            });

            closeItemActionSheet();
        }

        function closeItemActionSheet() {
            actionSheetItemId = null;
            document.getElementById("itemActionSheetOverlay").style.display = "none";
        }

        function openItemPopup(itemId) {
            const item = inventory.find(invItem => invItem.id === itemId);
            if (!item) return;

            closeCharacterPopup();
            closeItemActionSheet();

            document.getElementById("itemPopupImage").src = item.popupImage || item.icon;
            document.getElementById("itemPopupImage").alt = item.name;
            document.getElementById("itemPopupName").textContent = item.name;
            document.getElementById("itemPopupDescription").textContent = item.description || "";

            document.getElementById("itemPopupOverlay").style.display = "flex";
        }

        function closeItemPopup() {
            document.getElementById("itemPopupOverlay").style.display = "none";
        }

        function showGameMessage(message) {
            const messageBox = document.getElementById("gameMessage");

            clearTimeout(gameMessageTimer);

            messageBox.textContent = message;
            messageBox.style.display = "block";

            gameMessageTimer = setTimeout(() => {
                messageBox.style.display = "none";
            }, 3200);
        }

        function showDoorSpotMessage(message) {
            const messageBox = document.getElementById("gameMessage");
            const hotspotRect = basementDoorHotspot.getBoundingClientRect();

            clearTimeout(gameMessageTimer);

            messageBox.textContent = message;
            messageBox.style.display = "block";

            messageBox.style.position = "fixed";
            messageBox.style.left =
                Math.min(
                    window.innerWidth - 180,
                    Math.max(180, hotspotRect.left + hotspotRect.width / 2)
                ) + "px";

            messageBox.style.bottom = "auto";
            messageBox.style.top =
                Math.max(12, hotspotRect.top - 82) + "px";

            gameMessageTimer = setTimeout(() => {
                messageBox.style.display = "none";
                messageBox.style.left = "50%";
                messageBox.style.top = "auto";
                messageBox.style.bottom =
                    "calc(var(--inventory-height) + 25px)";
            }, 3200);
        }

        function openSafeKeypad() {
            keypadCode = "";
            keypadLocked = false;
            keypadDisplay.classList.remove("error");
            updateKeypadDisplay();
            safeKeypadOverlay.style.display = "flex";
        }

        function closeSafeKeypad() {
            safeKeypadOverlay.style.display = "none";
            keypadCode = "";
            keypadLocked = false;
        }

        function playKeypadSound() {
            if (!keypadSound) return;

            keypadSound.currentTime = 0;

            keypadSound.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        // Plays the sound for whichever item was just picked up. The
        // server sends the correct path already (each item's
        // pickupSound in game/items.js, or the shared default) — this
        // just needs to actually play it.
        function playPickupSound(soundPath) {
            if (!pickupSoundElement || !soundPath) return;

            if (pickupSoundElement.getAttribute("src") !== soundPath) {
                pickupSoundElement.setAttribute("src", soundPath);
            }

            pickupSoundElement.currentTime = 0;

            pickupSoundElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        // Always the same fixed sound (pickupitemsound.mp3), regardless
        // of which item — used whenever an item leaves this player's
        // inventory for a reason other than a fresh pickup (given away,
        // or consumed by a puzzle), or arrives from another player.
        function playItemRemovedSound() {
            if (!itemRemovedSoundElement) return;

            itemRemovedSoundElement.currentTime = 0;

            itemRemovedSoundElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        function pressKeypadNumber(number) {
            if (keypadLocked) return;
            if (keypadCode.length >= 8) return;

            playKeypadSound();

            keypadCode += number;
            updateKeypadDisplay();
        }

        function clearKeypad() {
            if (keypadLocked) return;

            playKeypadSound();

            keypadCode = "";
            updateKeypadDisplay();
        }

        function updateKeypadDisplay() {
            keypadDisplay.textContent = keypadCode || "----";
        }

        function submitKeypadCode() {
            if (!joinedLobby || keypadLocked) return;

            playKeypadSound();

            if (!keypadCode) {
                keypadDisplay.textContent = "ERROR";
                keypadDisplay.classList.add("error");

                setTimeout(() => {
                    keypadDisplay.classList.remove("error");
                    updateKeypadDisplay();
                }, 900);

                return;
            }

            keypadLocked = true;

            socket.emit("submitSafeCode", {
                code: joinedLobby.code,
                playerToken,
                enteredCode: keypadCode
            });
        }

        function leaveLobby() {
            if (joinedLobby) {
                socket.emit("leaveLobby", {
                    code: joinedLobby.code,
                    playerToken
                });
            }

            joinedLobby = null;
            inventory = [];
            closeItemPopup();
            closeItemActionSheet();
            closeCharacterPopup();
            closeAccusationMenu();
            closePianoGame();
            document.getElementById("votingOverlay").style.display = "none";
            document.getElementById("endingScreen").style.display = "none";
            endingTypewriterStarted = false;
            stopIntroMusic();
            renderInventory();
            forgetSession();

            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("joinScreen").style.display = "block";
            document.getElementById("status").innerText = "You left the lobby.";
        }

        function resetToJoinScreen(message) {
            joinedLobby = null;
            inventory = [];
            introStarted = false;
            letterIndex = 0;

            phoneStoryText.textContent = "";
            phoneEnterButton.style.display = "none";

            closeSafeKeypad();
            closeItemPopup();
            closeItemActionSheet();
            closeCharacterPopup();
            closeAccusationMenu();
            closePianoGame();
            document.getElementById("votingOverlay").style.display = "none";
            document.getElementById("endingScreen").style.display = "none";
            endingTypewriterStarted = false;
            stopIntroMusic();
            renderInventory();
            forgetSession();

            document.getElementById("waitingScreen").style.display = "none";
            document.getElementById("introScreen").style.display = "none";
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("joinScreen").style.display = "block";

            document.getElementById("status").innerText =
                message || "You left the lobby.";
        }

        function escapeHtml(text) {
            const element = document.createElement("div");
            element.textContent = text;
            return element.innerHTML;
        }
    </script>
</body>
</html>
