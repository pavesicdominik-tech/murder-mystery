<!DOCTYPE html>
<html>
<head>
    <title>Murder Mystery</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            color: white;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.7)),
                url("/images/background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Top navigation: lobby screen only */
        .top-menu {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .top-menu button {
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.30);
            color: rgba(255, 255, 255, 0.72);
            font-family: Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .top-menu button:hover {
            background: rgba(0, 0, 0, 0.62);
            color: white;
        }

        button {
            cursor: pointer;
        }

        #messageBox {
            position: absolute;
            top: 20px;
            right: 74px;
            display: none;
            max-width: 340px;
            padding: 12px 16px;
            background: rgba(90, 0, 0, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            z-index: 20;
            font-family: Arial, sans-serif;
        }

        #muteButton {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 21;
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.55);
            color: white;
            font-size: 20px;
            line-height: 1;
        }

        .main {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: clamp(60px, 10vw, 150px);
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 4px 16px black;
        }

        .subtitle {
            margin-top: 10px;
            font-family: Arial, sans-serif;
            font-size: clamp(18px, 2vw, 30px);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Main buttons now sit below the subtitle */
        .game-buttons {
            display: flex;
            gap: 14px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-buttons button {
            min-width: 160px;
            padding: 14px 24px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            border-radius: 4px;
            background: rgba(57, 12, 12, 0.82);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .game-buttons button:hover {
            background: rgba(105, 22, 22, 0.94);
            transform: translateY(-2px);
        }

        #status {
            margin-top: 34px;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }

        #lobbyInfo {
            width: min(620px, 90vw);
            margin-top: 20px;
            max-height: 34vh;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
        }

        #lobbyInfo::-webkit-scrollbar {
            width: 6px;
        }

        #lobbyInfo::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 7px 0;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.62);
            border-radius: 7px;
        }

        .player button {
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(95, 16, 16, 0.9);
            color: white;
            font-size: 14px;
        }

        .offline {
            opacity: 0.55;
        }

        @media (max-width: 600px) {
            .top-menu {
                width: 100%;
                gap: 6px;
                justify-content: center;
            }

            .top-menu button {
                padding: 7px 9px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-menu">
        <button type="button" onclick="showMessage('How to play will be added soon.')">How to play</button>
        <button type="button" onclick="showMessage('About will be added soon.')">About</button>
        <button type="button" onclick="showMessage('Contact will be added soon.')">Contact</button>
    </nav>

    <div id="messageBox"></div>

    <button id="muteButton" type="button" onclick="toggleMute()" aria-label="Toggle sound"></button>

    <main class="main">
        <h1>Murder Mystery</h1>
        <div class="subtitle">Couch game for friends and family.</div>

        <div class="game-buttons">
            <button id="createButton" onclick="createGame()">Create Game</button>
            <button id="startButton" onclick="startGame()">Start Game</button>
        </div>

        <div id="status">Create a game to begin.</div>
        <div id="lobbyInfo"></div>
    </main>

    <audio id="lobbyMusic" src="/sounds/lobbymusic.mp3" loop></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let currentLobby = null;
        let audioStarted = false;

        let tvSessionId = localStorage.getItem("tvSessionId");

        if (!tvSessionId) {
            tvSessionId = crypto.randomUUID();
            localStorage.setItem("tvSessionId", tvSessionId);
        }

        const lobbyMusic = document.getElementById("lobbyMusic");
        lobbyMusic.volume = 0.4;

        // Shared across tv/index.html and tv/game.html via localStorage,
        // so muting on one screen stays muted after navigating to the
        // other.
        const muteButton = document.getElementById("muteButton");
        let isMuted = localStorage.getItem("tvMuted") === "true";

        function applyMuteState() {
            lobbyMusic.muted = isMuted;
            muteButton.textContent = isMuted ? "\u{1F507}" : "\u{1F50A}";
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem("tvMuted", isMuted ? "true" : "false");
            applyMuteState();
        }

        applyMuteState();

        socket.on("connect", () => {
            socket.emit("join", {
                type: "tv",
                tvSessionId
            });
        });

        function startAudio() {
            if (audioStarted) return;

            audioStarted = true;
            lobbyMusic.play().catch(() => {});
        }

        document.body.addEventListener("click", startAudio);
        document.body.addEventListener("keydown", startAudio);

        function createGame() {
            socket.emit("createLobby");
        }

        function startGame() {
            if (!currentLobby) {
                showMessage("Create a lobby first.");
                return;
            }

            socket.emit("startGame", {
                code: currentLobby.code
            });
        }

        function kickPlayer(token) {
            if (!currentLobby) return;

            socket.emit("removePlayer", {
                code: currentLobby.code,
                playerToken: token
            });
        }

        socket.on("lobbyCreated", (lobby) => {
            currentLobby = lobby;
            renderLobby(lobby);
        });

        socket.on("lobbyUpdate", (lobby) => {
            /* Old lobby events must never replace the current TV lobby. */
            if (currentLobby && lobby.code !== currentLobby.code) return;

            currentLobby = lobby;
            renderLobby(lobby);
        });

        socket.on("gameStarted", () => {
            window.location.href = "/tv/intro.html";
        });

        socket.on("lobbyError", (message) => {
            showMessage(message);
        });

        function showMessage(message) {
            const box = document.getElementById("messageBox");
            box.innerText = message;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3500);
        }

        function renderLobby(lobby) {
            const qrHtml = lobby.qr
                ? `<br><img src="${lobby.qr}" width="190" alt="Join QR code">`
                : "";

            document.getElementById("status").innerHTML =
                `Lobby code: <strong>${lobby.code}</strong>${qrHtml}`;

            const playersHtml = lobby.players.length
                ? lobby.players.map((player) => `
                    <div class="player ${player.connected ? "" : "offline"}">
                        <span>
                            ${escapeHtml(player.name)}
                            ${player.connected ? "" : " (offline)"}
                        </span>
                        <button onclick="kickPlayer('${player.token}')">Remove</button>
                    </div>
                `).join("")
                : "<p>No players have joined yet.</p>";

            document.getElementById("lobbyInfo").innerHTML = `
                <h3>Players (${lobby.players.length}/${lobby.maxPlayers})</h3>
                ${playersHtml}
            `;
        }

        function escapeHtml(text) {
            const element = document.createElement("div");
            element.textContent = text;
            return element.innerHTML;
        }
    </script>
</body>
</html>
