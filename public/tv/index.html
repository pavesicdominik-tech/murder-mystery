<!DOCTYPE html>
<html>
<head>
    <title>Murder Mystery</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            color: white;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.7)),
                url("/images/background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Top navigation: lobby screen only */
        .top-menu {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        /* Icons only, top-left — this page (lobby creation) is the
           only TV screen with a language toggle at all. Once "Start
           Game" fires, the TV navigates away to tv/intro.html and
           tv/game.html, which always stay in English regardless of
           what was picked here — this choice is purely a convenience
           for the host while setting up, stored in this TV browser's
           own localStorage under a separate key from the phone's, so
           testing both roles in the same browser doesn't collide. */
        #tvLanguagePicker {
            position: absolute;
            top: 22px;
            left: 22px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .tvLanguageButton {
            width: 36px;
            height: 36px;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.30);
            cursor: pointer;
        }

        .tvLanguageButton.active {
            border-color: #f0c65d;
            box-shadow: 0 0 0 1px #f0c65d inset;
        }

        .tvLanguageButton img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }

        .top-menu button {
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.30);
            color: rgba(255, 255, 255, 0.72);
            font-family: Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .top-menu button:hover {
            background: rgba(0, 0, 0, 0.62);
            color: white;
        }

        button {
            cursor: pointer;
        }

        #messageBox {
            position: absolute;
            top: 20px;
            right: 74px;
            display: none;
            max-width: 340px;
            padding: 12px 16px;
            background: rgba(90, 0, 0, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            z-index: 20;
            font-family: Arial, sans-serif;
        }

        #muteButton {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 21;
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.55);
            color: white;
            font-size: 20px;
            line-height: 1;
        }

        .main {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: clamp(60px, 10vw, 150px);
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 4px 16px black;
        }

        .subtitle {
            margin-top: 10px;
            font-family: Arial, sans-serif;
            font-size: clamp(18px, 2vw, 30px);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Main buttons now sit below the subtitle */
        .game-buttons {
            display: flex;
            gap: 14px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-buttons button {
            min-width: 160px;
            padding: 14px 24px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            border-radius: 4px;
            background: rgba(57, 12, 12, 0.82);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .game-buttons button:hover {
            background: rgba(105, 22, 22, 0.94);
            transform: translateY(-2px);
        }

        #status {
            margin-top: 34px;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }

        #lobbyInfo {
            width: min(620px, 90vw);
            margin-top: 20px;
            max-height: 34vh;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
        }

        #lobbyInfo::-webkit-scrollbar {
            width: 6px;
        }

        #lobbyInfo::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 7px 0;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.62);
            border-radius: 7px;
        }

        .player button {
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(95, 16, 16, 0.9);
            color: white;
            font-size: 14px;
        }

        .offline {
            opacity: 0.55;
        }

        @media (max-width: 600px) {
            .top-menu {
                width: 100%;
                gap: 6px;
                justify-content: center;
            }

            .top-menu button {
                padding: 7px 9px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <nav class="top-menu">
        <button type="button" id="navHowToPlay" onclick="showMessage(tvMsg('How to play will be added soon.'))">How to play</button>
        <button type="button" id="navAbout" onclick="showMessage(tvMsg('About will be added soon.'))">About</button>
        <button type="button" id="navContact" onclick="showMessage(tvMsg('Contact will be added soon.'))">Contact</button>
    </nav>

    <div id="tvLanguagePicker">
        <button type="button" class="tvLanguageButton" id="tvLanguageButtonEn" onclick="setTvLanguage('en')">
            <img src="/images/engico.png" alt="English">
        </button>
        <button type="button" class="tvLanguageButton" id="tvLanguageButtonHr" onclick="setTvLanguage('hr')">
            <img src="/images/croico.png" alt="Hrvatski">
        </button>
    </div>

    <div id="messageBox"></div>

    <button id="muteButton" type="button" onclick="toggleMute()" aria-label="Toggle sound"></button>

    <main class="main">
        <h1 id="mainTitle">Murder Mystery</h1>
        <div class="subtitle" id="mainSubtitle">Couch game for friends and family.</div>

        <div class="game-buttons">
            <button id="createButton" onclick="createGame()">Create Game</button>
            <button id="startButton" onclick="startGame()">Start Game</button>
        </div>

        <div id="status">Create a game to begin.</div>
        <div id="lobbyInfo"></div>
    </main>

    <audio id="lobbyMusic" src="/sounds/lobbymusic.mp3" loop></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let currentLobby = null;
        let audioStarted = false;

        // Local to this TV browser only, and only affects THIS page
        // (lobby creation) — separate key from the phone's
        // localStorage language choice, and separate concept entirely
        // from tv/intro.html or tv/game.html, which always stay in
        // English once the game actually starts.
        let tvLanguage = localStorage.getItem("tvLanguage") === "hr" ? "hr" : "en";

        const TV_UI_HR = {
            howToPlay: "Kako igrati",
            about: "O igri",
            contact: "Kontakt",
            gameTitle: "Ubojstvo Misterija",
            gameSubtitle: "Kauč igra za obitelj i prijatelje.",
            createGame: "Stvori igru",
            startGame: "Pokreni igru",
            createToBegin: "Stvori igru za početak.",
            lobbyCode: "Kod sobe:",
            players: "Igrači",
            noPlayersJoined: "Još se nitko nije pridružio.",
            removeButton: "Ukloni",
            offline: "(offline)"
        };

        const TV_MESSAGE_HR = {
            "How to play will be added soon.": "Upute za igranje uskoro stižu.",
            "About will be added soon.": "Informacije o igri uskoro stižu.",
            "Contact will be added soon.": "Podaci za kontakt uskoro stižu.",
            "Too many lobbies created. Please wait 30 seconds.": "Previše stvorenih soba. Pričekaj 30 sekundi.",
            "TV session was not initialized.": "TV sesija nije pokrenuta.",
            "At least one player must join before starting.": "Barem jedan igrač mora pristupiti prije početka.",
            "Game no longer exists.": "Igra više ne postoji."
        };

        function tvUI(key) {
            if (tvLanguage === "hr" && TV_UI_HR[key]) return TV_UI_HR[key];
            return null;
        }

        function tvMsg(text) {
            if (tvLanguage !== "hr") return text;
            return TV_MESSAGE_HR[text] || text;
        }

        function setTvLanguage(lang) {
            tvLanguage = (lang === "hr") ? "hr" : "en";
            localStorage.setItem("tvLanguage", tvLanguage);
            applyTvLanguage();
        }

        function applyTvLanguage() {
            document.getElementById("tvLanguageButtonEn").classList.toggle("active", tvLanguage === "en");
            document.getElementById("tvLanguageButtonHr").classList.toggle("active", tvLanguage === "hr");

            document.getElementById("navHowToPlay").textContent = tvUI("howToPlay") || "How to play";
            document.getElementById("navAbout").textContent = tvUI("about") || "About";
            document.getElementById("navContact").textContent = tvUI("contact") || "Contact";
            document.getElementById("mainTitle").textContent = tvUI("gameTitle") || "Murder Mystery";
            document.getElementById("mainSubtitle").textContent = tvUI("gameSubtitle") || "Couch game for friends and family.";
            document.getElementById("createButton").textContent = tvUI("createGame") || "Create Game";
            document.getElementById("startButton").textContent = tvUI("startGame") || "Start Game";

            // Only overwrite the status line with the idle default if
            // a lobby hasn't been created yet — once it has,
            // renderLobby() below owns that element instead.
            if (!currentLobby) {
                document.getElementById("status").textContent = tvUI("createToBegin") || "Create a game to begin.";
            } else {
                renderLobby(currentLobby);
            }
        }

        let tvSessionId = localStorage.getItem("tvSessionId");

        if (!tvSessionId) {
            tvSessionId = crypto.randomUUID();
            localStorage.setItem("tvSessionId", tvSessionId);
        }

        const lobbyMusic = document.getElementById("lobbyMusic");
        lobbyMusic.volume = 0.4;

        // Shared across tv/index.html and tv/game.html via localStorage,
        // so muting on one screen stays muted after navigating to the
        // other.
        const muteButton = document.getElementById("muteButton");
        let isMuted = localStorage.getItem("tvMuted") === "true";

        function applyMuteState() {
            lobbyMusic.muted = isMuted;
            muteButton.textContent = isMuted ? "\u{1F507}" : "\u{1F50A}";
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem("tvMuted", isMuted ? "true" : "false");
            applyMuteState();
        }

        applyMuteState();

        socket.on("connect", () => {
            socket.emit("join", {
                type: "tv",
                tvSessionId
            });
        });

        function startAudio() {
            if (audioStarted) return;

            audioStarted = true;
            lobbyMusic.play().catch(() => {});
        }

        document.body.addEventListener("click", startAudio);
        document.body.addEventListener("keydown", startAudio);

        function createGame() {
            socket.emit("createLobby");
        }

        function startGame() {
            if (!currentLobby) {
                showMessage("Create a lobby first.");
                return;
            }

            socket.emit("startGame", {
                code: currentLobby.code
            });
        }

        function kickPlayer(token) {
            if (!currentLobby) return;

            socket.emit("removePlayer", {
                code: currentLobby.code,
                playerToken: token
            });
        }

        socket.on("lobbyCreated", (lobby) => {
            currentLobby = lobby;
            renderLobby(lobby);
        });

        socket.on("lobbyUpdate", (lobby) => {
            /* Old lobby events must never replace the current TV lobby. */
            if (currentLobby && lobby.code !== currentLobby.code) return;

            currentLobby = lobby;
            renderLobby(lobby);
        });

        socket.on("gameStarted", () => {
            window.location.href = "/tv/intro.html";
        });

        socket.on("lobbyError", (message) => {
            showMessage(tvMsg(message));
        });

        function showMessage(message) {
            const box = document.getElementById("messageBox");
            box.innerText = message;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3500);
        }

        function renderLobby(lobby) {
            const qrHtml = lobby.qr
                ? `<br><img src="${lobby.qr}" width="190" alt="Join QR code">`
                : "";

            const lobbyCodeLabel = tvUI("lobbyCode") || "Lobby code:";

            document.getElementById("status").innerHTML =
                `${lobbyCodeLabel} <strong>${lobby.code}</strong>${qrHtml}`;

            const offlineLabel = tvUI("offline") || "(offline)";
            const removeLabel = tvUI("removeButton") || "Remove";

            const playersHtml = lobby.players.length
                ? lobby.players.map((player) => `
                    <div class="player ${player.connected ? "" : "offline"}">
                        <span>
                            ${escapeHtml(player.name)}
                            ${player.connected ? "" : " " + offlineLabel}
                        </span>
                        <button onclick="kickPlayer('${player.token}')">${removeLabel}</button>
                    </div>
                `).join("")
                : `<p>${tvUI("noPlayersJoined") || "No players have joined yet."}</p>`;

            const playersLabel = tvUI("players") || "Players";

            document.getElementById("lobbyInfo").innerHTML = `
                <h3>${playersLabel} (${lobby.players.length}/${lobby.maxPlayers})</h3>
                ${playersHtml}
            `;
        }

        function escapeHtml(text) {
            const element = document.createElement("div");
            element.textContent = text;
            return element.innerHTML;
        }

        applyTvLanguage();
    </script>
</body>
</html>
