<!DOCTYPE html>
<html>
<head>
    <title>Murder Mystery — Intro</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: black;
            color: #f2e5c4;
            font-family: "Courier New", Courier, monospace;
        }

        #intro {
            width: 100%;
            height: 100%;
            opacity: 0;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.38), rgba(0, 0, 0, 0.75)),
                url("/images/intro-background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 3s ease;
        }

        #textBox {
            width: min(900px, 88vw);
            max-height: 92vh;
            padding: clamp(16px, 3vw, 32px);
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.42);
            border: 1px solid rgba(242, 229, 196, 0.25);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* No max-height/scroll here on purpose — fitStoryText() in the
           script below shrinks #storyText's font-size (within
           STORY_MIN_FONT_PX/STORY_MAX_FONT_PX) until the full text
           actually fits in the space available, so the whole story is
           always visible without needing to scroll, regardless of how
           long it ends up being (e.g. many players' names woven in). */
        #storyTextScroll {
            width: 100%;
            overflow: hidden;
        }

        #storyText {
            margin: 0;
            line-height: 1.5;
            white-space: pre-wrap;
            text-shadow: 2px 2px 4px black;
        }

        .cursor {
            display: inline-block;
            width: 14px;
            height: 1.1em;
            margin-left: 6px;
            vertical-align: -0.15em;
            background: #f2e5c4;
            animation: blink 0.8s steps(1) infinite;
        }

        #enterButton {
            display: none;
            margin-top: 35px;
            padding: 15px 28px;
            border: 1px solid rgba(242, 229, 196, 0.75);
            background: rgba(0, 0, 0, 0.65);
            color: #f2e5c4;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 22px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.25s ease;
        }

        #enterButton:hover {
            background: rgba(242, 229, 196, 0.2);
            transform: scale(1.04);
        }

        #connectionStatus {
            position: absolute;
            bottom: 18px;
            right: 22px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            opacity: 0.55;
        }

        #muteButton {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 21;
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.55);
            color: white;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="intro">
        <div id="textBox">
            <div id="storyTextScroll">
                <p id="storyText"></p><span class="cursor"></span>
            </div>

            <button id="enterButton" onclick="enterMansion()">
                Enter the Mansion
            </button>
        </div>
    </div>

    <div id="connectionStatus">Connecting…</div>

    <button id="muteButton" type="button" onclick="toggleMute()" aria-label="Toggle sound"></button>

    <audio id="typeSound" src="/sounds/typewriter.mp3"></audio>
    <audio id="introMusicElement" src="/sounds/intro-music.mp3" loop></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const intro = document.getElementById("intro");
        const storyText = document.getElementById("storyText");
        const typeSound = document.getElementById("typeSound");
        const enterButton = document.getElementById("enterButton");
        const connectionStatus = document.getElementById("connectionStatus");
        const introMusicElement = document.getElementById("introMusicElement");
        const muteButton = document.getElementById("muteButton");

        // Shared with tv/index.html and tv/game.html via localStorage,
        // so muting on any TV screen stays muted on the others.
        let isMuted = localStorage.getItem("tvMuted") === "true";

        function applyMuteState() {
            introMusicElement.muted = isMuted;
            muteButton.textContent = isMuted ? "\u{1F507}" : "\u{1F50A}";
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem("tvMuted", isMuted ? "true" : "false");
            applyMuteState();
        }

        applyMuteState();

        // Same localStorage key as tv/index.html and tv/game.html — the
        // language is chosen once, on the lobby screen, and carried
        // forward here via this shared key.
        const tvLanguage = localStorage.getItem("tvLanguage") === "hr" ? "hr" : "en";

        const TV_UI_HR = {
            connectingToGame: "Povezivanje s igrom…",
            lobbyConnected: "povezana",
            reconnecting: "Ponovno povezivanje…",
            enterMansion: "Uđi u dvorac"
        };

        function tvUI(key) {
            if (tvLanguage === "hr" && TV_UI_HR[key]) return TV_UI_HR[key];
            return null;
        }

        enterButton.textContent = tvUI("enterMansion") || "Enter the Mansion";

        let tvSessionId = localStorage.getItem("tvSessionId");
        let lobbyRestored = false;
        let currentLobby = null;

        if (!tvSessionId) {
            window.location.href = "/tv/";
        }

        socket.on("connect", () => {
            connectionStatus.innerText = tvUI("connectingToGame") || "Connecting to game…";

            socket.emit("join", {
                type: "tv",
                tvSessionId
            });

            // If the server does not restore a lobby, this page was opened directly.
            setTimeout(() => {
                if (!lobbyRestored) {
                    window.location.href = "/tv/";
                }
            }, 1200);
        });

        socket.on("lobbyCreated", (lobby) => {
            lobbyRestored = true;
            currentLobby = lobby;
            connectionStatus.innerText = "Lobby " + lobby.code + " " + (tvUI("lobbyConnected") || "connected");

            if (lobby.status === "playing") {
                window.location.href = "/tv/game.html";
                return;
            }

            startIntro();
        });

        socket.on("lobbyUpdate", (lobby) => {
            if (currentLobby && lobby.code !== currentLobby.code) return;

            currentLobby = lobby;

            if (lobby.status === "playing") {
                window.location.href = "/tv/game.html";
            }
        });

        socket.on("mansionEntered", () => {
            window.location.href = "/tv/game.html";
        });

        socket.on("disconnect", () => {
            connectionStatus.innerText = tvUI("reconnecting") || "Reconnecting…";
        });

        let letterIndex = 0;
        const typingSpeed = 42;
        let introStarted = false;

        // Broadcast to phones via introStoryReady/introStory below —
        // always English, regardless of this TV's own language. A
        // Croatian-language phone already builds its own Croatian
        // version locally and ignores this broadcast entirely (see
        // buildCroatianStory() in phone/index.html) — English-language
        // phones are the ones actually relying on this.
        let story = "";

        // What THIS TV screen actually displays/types out — English or
        // Croatian depending on tvLanguage, set once in startIntro()
        // below. Deliberately a separate variable from `story` above:
        // the two can differ (e.g. Croatian TV + a mix of English/
        // Croatian phones), and only `story` (English) ever goes out
        // over the wire.
        let displayStory = "";

        // Uses this TV's own local clock — since the TV is the host
        // device, that's the host's time zone with no extra plumbing
        // needed.
        function buildStory(lobby) {
            const now = new Date();

            const dateStr = now.toLocaleDateString(undefined, {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            });

            const timeStr = now.toLocaleTimeString(undefined, {
                hour: "numeric",
                minute: "2-digit"
            });

            const detectiveNames = (lobby.players || [])
                .map(p => p.name)
                .filter(Boolean)
                .join(", ");

            const detectiveLine = detectiveNames
                ? `A team of detectives — ${detectiveNames} — was called to the scene to investigate this unusual death.`
                : "A team of detectives was called to the scene to investigate this unusual death.";

            return [
                `${dateStr}, ${timeStr}.`,
                "",
                "The owner of this manor was found dead in the lobby, at the foot of the stairs, discovered by the butler.",
                "The body bore no wounds, suggesting a tragic accident.",
                "",
                detectiveLine
            ].join("\n");
        }

        // Same content as buildStory() above, in Croatian — kept as a
        // fully separate function (rather than a lookup table) since
        // it's a short narrative paragraph, not a handful of discrete
        // strings.
        function buildCroatianStory(lobby) {
            const now = new Date();

            const dateStr = now.toLocaleDateString("hr-HR", {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            });

            const timeStr = now.toLocaleTimeString("hr-HR", {
                hour: "numeric",
                minute: "2-digit"
            });

            const detectiveNames = (lobby.players || [])
                .map(p => p.name)
                .filter(Boolean)
                .join(", ");

            const detectiveLine = detectiveNames
                ? `Ekipa detektiva — ${detectiveNames} — pozvana je na mjesto događaja kako bi istražila ovu neobičnu smrt.`
                : "Ekipa detektiva pozvana je na mjesto događaja kako bi istražila ovu neobičnu smrt.";

            return [
                `${dateStr}, ${timeStr}.`,
                "",
                "Vlasnik ovog dvorca pronađen je mrtav u predvorju, u podnožju stepenica, a otkrio ga je batler.",
                "Na tijelu nije bilo rana, što upućuje na tragičnu nesreću.",
                "",
                detectiveLine
            ].join("\n");
        }

        function startIntro() {
            if (introStarted) return;

            introStarted = true;
            story = buildStory(currentLobby || {});
            displayStory = (tvLanguage === "hr")
                ? buildCroatianStory(currentLobby || {})
                : story;

            if (currentLobby) {
                socket.emit("introStoryReady", {
                    code: currentLobby.code,
                    story
                });
            }

            fitStoryTextToScreen(displayStory);

            setTimeout(() => {
                intro.style.opacity = "1";
            }, 150);

            setTimeout(() => {
                typeNextLetter();
            }, 1600);

            introMusicElement.currentTime = 0;
            introMusicElement.play().catch(() => {
                // Sound is optional. Browsers may block audio until interaction.
            });
        }

        const STORY_MAX_FONT_PX = 40;
        const STORY_MIN_FONT_PX = 15;

        // Measures the FULL story text (not the partial text the
        // typewriter has revealed so far) against the space actually
        // available on screen, and picks the largest font size that
        // fits without needing #storyTextScroll to scroll. Run once,
        // before typing starts, so the box's size/font stays fixed for
        // the entire typing animation rather than resizing mid-type.
        function fitStoryTextToScreen(fullStory) {
            const scrollEl = document.getElementById("storyTextScroll");

            // Reserve room for the Enter button, textBox padding, and
            // some breathing room, so the fitted text doesn't leave
            // the button crammed against the last line.
            const reservedPx = 170;
            const maxHeightPx = Math.max(
                window.innerHeight * 0.92 - reservedPx,
                120
            );

            storyText.textContent = fullStory;

            let fontSize = STORY_MAX_FONT_PX;
            storyText.style.fontSize = fontSize + "px";

            while (scrollEl.scrollHeight > maxHeightPx && fontSize > STORY_MIN_FONT_PX) {
                fontSize -= 1;
                storyText.style.fontSize = fontSize + "px";
            }

            // Clear it back out — typeNextLetter() below re-reveals the
            // text one letter at a time at this now-fixed font size.
            storyText.textContent = "";
        }

        function typeNextLetter() {
            if (letterIndex >= displayStory.length) {
                enterButton.style.display = "inline-block";
                return;
            }

            const letter = displayStory[letterIndex];
            storyText.textContent += letter;
            letterIndex++;

            if (letter !== " " && letter !== "\n") {
                typeSound.currentTime = 0;
                typeSound.play().catch(() => {});
            }

            const delay = letter === "\n" ? 450 : typingSpeed;
            setTimeout(typeNextLetter, delay);
        }

        function enterMansion() {
            if (!currentLobby) return;

            introMusicElement.pause();
            introMusicElement.currentTime = 0;

            socket.emit("enterMansion", {
                code: currentLobby.code
            });
        }
    </script>
</body>
</html>
